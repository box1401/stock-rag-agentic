name: deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "infra/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  AR_REPO: compass

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-prod
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker auth for Artifact Registry
        run: gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet

      - name: Set image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Stage seed data into api build context
        run: cp -r data apps/api/_data

      - name: Build & push api image
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPO}/api:${{ steps.tag.outputs.sha }}"
          docker build -t "$IMAGE" -t "${IMAGE%:*}:latest" apps/api
          docker push "$IMAGE"
          docker push "${IMAGE%:*}:latest"

      - name: Build & push reranker image
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPO}/reranker:${{ steps.tag.outputs.sha }}"
          docker build -t "$IMAGE" -t "${IMAGE%:*}:latest" apps/reranker
          docker push "$IMAGE"
          docker push "${IMAGE%:*}:latest"

      - name: Build & push web image
        env:
          API_URL_HINT: https://compass-api-${{ vars.GCP_PROJECT_NUMBER }}.${{ vars.GCP_REGION }}.run.app
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPO}/web:${{ steps.tag.outputs.sha }}"
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${API_URL_HINT}" \
            -t "$IMAGE" -t "${IMAGE%:*}:latest" apps/web
          docker push "$IMAGE"
          docker push "${IMAGE%:*}:latest"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform init
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="bucket=${GCP_PROJECT_ID}-tfstate"

      - name: Terraform validate + plan + apply
        working-directory: infra/terraform
        run: |
          terraform fmt -check -recursive
          terraform validate
          terraform plan \
            -var "project_id=${GCP_PROJECT_ID}" \
            -var "region=${GCP_REGION}" \
            -var "image_tag=${{ steps.tag.outputs.sha }}" \
            -var "github_repo=${GITHUB_REPOSITORY}" \
            -out=tfplan
          terraform apply -auto-approve tfplan

      - name: Print service URLs
        working-directory: infra/terraform
        run: terraform output -no-color
